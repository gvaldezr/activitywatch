version: '3.9'

# ActivityWatch Remote Deployment Configuration
# This Docker Compose file demonstrates multi-machine setups with ActivityWatch

services:
  # Single-machine remote deployment
  aw-server-remote:
    image: activitywatch:remote-latest
    build:
      context: .
      dockerfile: Dockerfile.remote
    container_name: aw-server-remote
    environment:
      # Listen on all interfaces for remote connections
      AW_SERVER_HOST: 0.0.0.0
      AW_SERVER_PORT: 5601
      # Optional: Set log level
      AW_LOG_LEVEL: info
      # Optional: API key for authentication (recommended for production)
      # Uncomment and set in .env file:
      # AW_SERVER_API_KEY: ${AW_SERVER_API_KEY}
    ports:
      - "${AW_SERVER_PORT:-5601}:${AW_SERVER_PORT:-5601}"
    volumes:
      # Persist data across container restarts
      - aw-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'exec 3<>/dev/tcp/localhost/5601 && echo HEALTH' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - aw-network
    # Security: Run as non-root
    user: "1000:1000"

  # Optional: Nginx reverse proxy with SSL/TLS (Recommended for production)
  # Uncomment to enable
  # aw-proxy:
  #   image: nginx:alpine
  #   container_name: aw-proxy
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - aw-server-remote
  #   networks:
  #     - aw-network
  #   restart: unless-stopped

networks:
  aw-network:
    driver: bridge

volumes:
  aw-data:
    driver: local

# Quick Start:
# ============
#
# 1. Build the image:
#    docker compose -f docker-compose.remote.yml build
#
# 2. Start the server:
#    docker compose -f docker-compose.remote.yml up -d
#
# 3. Check logs:
#    docker compose -f docker-compose.remote.yml logs -f aw-server-remote
#
# 4. Verify API is running:
#    curl http://localhost:5600/api/
#
# 5. Connect a remote client:
#    export AW_SERVER_HOST=your.server.com
#    export AW_SERVER_PORT=5600
#    export AW_SERVER_API_KEY=your_api_key
#    aw-client heartbeat bucket_name '{"data":"value"}'
#
# 6. Stop the server:
#    docker compose -f docker-compose.remote.yml down
#
# Accessing the Web UI (Optional):
# =================================
#
# Option A: Use aw-webui from your machine
#   1. Clone aw-webui: git clone https://github.com/ActivityWatch/aw-webui.git
#   2. Configure proxy to point to this server (edit aw-webui config)
#   3. Run: npm run serve (from aw-webui directory)
#   4. Open http://localhost:8080
#
# Option B: Use aw-qt or aw-cli (desktop clients)
#   These connect directly to the server and don't require a web UI
#
# Production Recommendations:
# ===========================
#
# 1. Use Nginx reverse proxy with SSL/TLS termination (see aw-proxy service above)
# 2. Set AW_SERVER_API_KEY environment variable for authentication
# 3. Use .env file for sensitive configuration
# 4. Use external volumes for data persistence
# 5. Configure firewall rules to restrict access
# 6. Use strong API keys (e.g., generated with: openssl rand -base64 32)
# 7. Monitor logs regularly
# 8. Keep ActivityWatch updated for security patches
#
# Port Mapping:
# =============
# API Server:    http://localhost:5600  (internal: 5600)
# Nginx Proxy:   https://your.domain    (optional, recommended for production)
#
# Example .env file:
# ===================
# AW_SERVER_HOST=0.0.0.0
# AW_SERVER_PORT=5600
# AW_SERVER_API_KEY=your_strong_api_key_here
# AW_LOG_LEVEL=info
