version: '3.9'

# ActivityWatch Remote Deployment Configuration
# This Docker Compose file demonstrates multi-machine setups with ActivityWatch

services:
  # PostgreSQL Database (required for multi-user deployments)
  postgres:
    image: postgres:16-alpine
    container_name: aw-postgres
    environment:
      POSTGRES_DB: activitywatch
      POSTGRES_USER: ${POSTGRES_USER:-activitywatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-activitywatch-secure-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Persist database data across container restarts
      - postgres-data:/var/lib/postgresql/data
    networks:
      - aw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-activitywatch} -d activitywatch"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Single-machine remote deployment
  aw-server-remote:
    image: activitywatch:remote-latest
    build:
      context: .
      dockerfile: Dockerfile.remote
    container_name: aw-server-remote
    environment:
      # Listen on all interfaces for remote connections
      AW_SERVER_HOST: 0.0.0.0
      AW_SERVER_PORT: 5603
      # PostgreSQL configuration (production-grade storage)
      AW_STORAGE: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-activitywatch}:${POSTGRES_PASSWORD:-activitywatch-secure-password}@postgres:5432/activitywatch
      # Optional: Set log level
      AW_LOG_LEVEL: info
      # Optional: API key for authentication (recommended for production)
      # Uncomment and set in .env file:
      # AW_SERVER_API_KEY: ${AW_SERVER_API_KEY}
    ports:
      - "${AW_SERVER_PORT:-5603}:${AW_SERVER_PORT:-5603}"
    volumes:
      # Persist data across container restarts (for file-based config, not main data)
      - aw-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'exec 3<>/dev/tcp/localhost/5603 && echo HEALTH' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - aw-network
    # Security: Run as non-root
    user: "1000:1000"

  # Optional: Nginx reverse proxy with SSL/TLS (Recommended for production)
  # Uncomment to enable
  # aw-proxy:
  #   image: nginx:alpine
  #   container_name: aw-proxy
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - aw-server-remote
  #   networks:
  #     - aw-network
  #   restart: unless-stopped

networks:
  aw-network:
    driver: bridge

volumes:
  aw-data:
    driver: local
  postgres-data:
    driver: local

# Quick Start with PostgreSQL:
# =============================
#
# 1. (Optional) Create .env file with custom database credentials:
#    POSTGRES_USER=myuser
#    POSTGRES_PASSWORD=mypassword
#    POSTGRES_PORT=5432
#
# 2. Build the services:
#    docker compose -f docker-compose.remote.yml build
#
# 3. Start services (PostgreSQL + API server):
#    docker compose -f docker-compose.remote.yml up -d
#
# 4. Verify both services are running:
#    docker compose -f docker-compose.remote.yml ps
#
# 5. Check logs:
#    docker compose -f docker-compose.remote.yml logs -f aw-server-remote
#
# 6. Verify API is running:
#    curl http://localhost:5603/api/
#
# 7. Connect a remote client:
#    export AW_SERVER_HOST=your.server.com
#    export AW_SERVER_PORT=5603
#    export AW_SERVER_API_KEY=your_api_key
#    aw-client heartbeat bucket_name '{"data":"value"}'
#
# 8. Stop all services:
#    docker compose -f docker-compose.remote.yml down
#
# Database Management:
# ====================
#
# View PostgreSQL logs:
#   docker compose -f docker-compose.remote.yml logs postgres
#
# Connect to PostgreSQL directly:
#   PGPASSWORD=activitywatch-secure-password psql -h localhost -U activitywatch -d activitywatch
#
# Backup database:
#   docker compose -f docker-compose.remote.yml exec postgres pg_dump -U activitywatch activitywatch > backup.sql
#
# Restore database:
#   docker compose -f docker-compose.remote.yml exec -T postgres psql -U activitywatch activitywatch < backup.sql
#
# Accessing the Web UI:
# ====================
#
# This Docker deployment provides the API server only.
# Access the web UI using one of these methods:
#
# Option A: Desktop Clients (Recommended for quick access)
#   - aw-qt: Qt-based desktop client with built-in web UI
#   - aw-tauri: Lightweight Tauri-based client
#   Configure them to point to this server:
#     AW_SERVER_HOST=your.server.com
#     AW_SERVER_PORT=5603
#
# Option B: Development Web UI (on your local machine)
#   1. Clone aw-webui: git clone https://github.com/ActivityWatch/aw-webui.git
#   2. cd aw-webui && npm install
#   3. Set API endpoint and run development server:
#      AW_SERVER_URL="'http://your.server.com:5603'" npm run serve
#   4. Open http://localhost:8080 in your browser
#      (browser will connect to the remote server)
#
# Option C: Production Web UI (served separately)
#   1. Build aw-webui: npm run build
#   2. Serve dist/ folder via Nginx or another web server
#   3. Configure CORS on this server or use reverse proxy
#   4. Point the web UI to this server's API endpoint
#
# Production Recommendations:
# ===========================
#
# 1. Use Nginx reverse proxy with SSL/TLS termination (see aw-proxy service above)
# 2. Set AW_SERVER_API_KEY environment variable for authentication
# 3. Use .env file for sensitive configuration (especially POSTGRES_PASSWORD)
# 4. Use external volumes for data persistence (see volumes section)
# 5. Configure firewall rules to restrict access
# 6. Use strong API keys (e.g., generated with: openssl rand -base64 32)
# 7. Monitor logs regularly
# 8. Keep ActivityWatch updated for security patches
# 9. Regular database backups: docker compose exec postgres pg_dump -U activitywatch activitywatch
#
# Storage Backend Options:
# ========================
#
# Default: PostgreSQL (recommended for production multi-user setups)
#   - Multi-user support
#   - High concurrency
#   - ACID transactions
#   - Better for distributed deployments
#   - Set: AW_STORAGE=postgres, DATABASE_URL=postgresql://...
#
# Alternative: SQLite (for single-user, lightweight deployments)
#   - Requires no separate service
#   - Minimal setup
#   - Lower resource usage
#   - Good for testing/development
#   - Set: AW_STORAGE=peewee (omit DATABASE_URL)
#   - Remove 'postgres' service from this compose file if using SQLite
#
# Port Mapping:
# =============
# API Server:         http://localhost:5603  (internal: 5603)
# PostgreSQL:         localhost:5432 (internal: 5432, for direct DB connection)
# Nginx Proxy:        https://your.domain    (optional, recommended for production)
#
# Example .env file:
# ===================
# AW_SERVER_HOST=0.0.0.0
# AW_SERVER_PORT=5603
# AW_STORAGE=postgres
# POSTGRES_USER=activitywatch
# POSTGRES_PASSWORD=your_secure_password_here
# POSTGRES_PORT=5432
# DATABASE_URL=postgresql://activitywatch:your_secure_password_here@postgres:5432/activitywatch
# AW_SERVER_API_KEY=your_strong_api_key_here
# AW_LOG_LEVEL=info
